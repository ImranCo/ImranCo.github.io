<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Imran & Co — Lead Tracker</title>
<script src="https://cdn.jsdelivr.net/npm/@azure/msal-browser@2.38.3/lib/msal-browser.min.js"></script>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=DM+Sans:opsz,wght@9..40,300;9..40,400;9..40,500&display=swap" rel="stylesheet">
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  --ink:      #0f0f0d;
  --ink2:     #45453f;
  --ink3:     #88887e;
  --ink4:     #c4c4bc;
  --paper:    #f6f5f1;
  --surface:  #ffffff;
  --surface2: #f0efe9;
  --line:     rgba(15,15,13,0.10);
  --line2:    rgba(15,15,13,0.18);

  --green-bg: #e8f4ee; --green-tx: #1a5c33;
  --amber-bg: #fdf0d8; --amber-tx: #7a4a00;
  --red-bg:   #fceaea; --red-tx:   #7a1a1a;
  --blue-bg:  #e6eefa; --blue-tx:  #1a3a7a;
  --grey-bg:  #eeeeed; --grey-tx:  #4a4a44;
  --purple-bg:#eeeafc; --purple-tx:#3a2a7a;
  --rose-bg:  #fceaf2; --rose-tx:  #7a1a4a;

  --serif: 'DM Serif Display', Georgia, serif;
  --sans:  'DM Sans', system-ui, sans-serif;
  --r:     10px;
  --rl:    16px;
  --sidebar: 240px;
  --topbar-h: 60px;
}

@media (prefers-color-scheme: dark) {
  :root {
    --ink:      #f0efe9;
    --ink2:     #c0bfb7;
    --ink3:     #7a7a72;
    --ink4:     #3a3a36;
    --paper:    #111110;
    --surface:  #1c1c1a;
    --surface2: #242422;
    --line:     rgba(255,255,255,0.08);
    --line2:    rgba(255,255,255,0.14);
    --green-bg: #0e2e1a; --green-tx: #6ec98a;
    --amber-bg: #2e1e08; --amber-tx: #e8a84a;
    --red-bg:   #2e0e0e; --red-tx:   #e87a7a;
    --blue-bg:  #0e1a3a; --blue-tx:  #7aaae8;
    --grey-bg:  #242422; --grey-tx:  #a0a098;
    --purple-bg:#1a0e3a; --purple-tx:#b0a0e8;
    --rose-bg:  #2e0e1e; --rose-tx:  #e87ab0;
  }
}

html, body { height: 100%; background: var(--paper); font-family: var(--sans); color: var(--ink); -webkit-font-smoothing: antialiased; overflow: hidden; }


/* ─── LAYOUT ─────────────────────────────────── */
#app {
  display: none;
  height: 100vh;
  overflow: hidden;
}

/* Desktop: sidebar + main */
.shell {
  display: flex;
  height: 100vh;
  overflow: hidden;
}

/* ─── SIDEBAR ─────────────────────────────────── */
.sidebar {
  width: var(--sidebar);
  min-width: var(--sidebar);
  background: var(--surface);
  border-right: 1px solid var(--line);
  display: flex;
  flex-direction: column;
  height: 100vh;
  overflow: hidden;
}

.sb-top {
  padding: 28px 22px 22px;
  border-bottom: 1px solid var(--line);
}
.sb-mark {
  font-family: var(--serif);
  font-size: 18px;
  letter-spacing: -0.2px;
  margin-bottom: 2px;
}
.sb-mark em { font-style: italic; color: var(--ink3); }
.sb-tag {
  font-size: 10px;
  font-weight: 500;
  color: var(--ink4);
  letter-spacing: 0.12em;
  text-transform: uppercase;
}

.sb-nav {
  flex: 1;
  padding: 16px 12px;
  display: flex;
  flex-direction: column;
  gap: 2px;
  overflow-y: auto;
}
.sb-item {
  display: flex;
  align-items: center;
  gap: 10px;
  padding: 10px 12px;
  border-radius: var(--r);
  cursor: pointer;
  border: none;
  background: none;
  width: 100%;
  font-family: var(--sans);
  font-size: 14px;
  font-weight: 400;
  color: var(--ink3);
  transition: background 0.12s, color 0.12s;
  text-align: left;
}
.sb-item:hover { background: var(--surface2); color: var(--ink); }
.sb-item.active { background: var(--ink); color: var(--paper); font-weight: 500; }
.sb-item .sb-icon { width: 16px; height: 16px; flex-shrink: 0; opacity: 0.7; }
.sb-item.active .sb-icon { opacity: 1; filter: invert(1); }
@media (prefers-color-scheme: dark) {
  .sb-item.active .sb-icon { filter: invert(0); }
}
.sb-pill {
  margin-left: auto;
  font-size: 11px;
  font-weight: 500;
  background: var(--surface2);
  color: var(--ink3);
  padding: 1px 7px;
  border-radius: 20px;
}
.sb-item.active .sb-pill { background: rgba(255,255,255,0.18); color: rgba(255,255,255,0.8); }

.sb-bottom {
  padding: 16px 12px;
  border-top: 1px solid var(--line);
}
.sb-signout {
  display: flex;
  align-items: center;
  gap: 10px;
  padding: 10px 12px;
  border-radius: var(--r);
  cursor: pointer;
  border: none;
  background: none;
  width: 100%;
  font-family: var(--sans);
  font-size: 13px;
  color: var(--ink3);
  transition: background 0.12s;
}
.sb-signout:hover { background: var(--surface2); color: var(--red-tx); }
.sb-divider { padding: 8px 12px; font-size: 10px; font-weight: 500; letter-spacing: 0.1em; text-transform: uppercase; color: var(--ink4); margin-top: 8px; }

/* ─── MAIN CONTENT ─────────────────────────────────── */
.main {
  flex: 1;
  min-width: 0;
  display: flex;
  flex-direction: column;
  height: 100vh;
  overflow: hidden;
}

.main-header {
  padding: 0 28px;
  height: var(--topbar-h);
  display: flex;
  align-items: center;
  justify-content: space-between;
  border-bottom: 1px solid var(--line);
  background: var(--surface);
  flex-shrink: 0;
}
.main-title { font-size: 16px; font-weight: 500; letter-spacing: -0.2px; }
.main-date { font-size: 13px; color: var(--ink3); }

.main-body {
  flex: 1;
  overflow-y: auto;
  overflow-x: hidden;
}

/* ─── STATS ROW ─────────────────────────────────── */
.stats-bar {
  display: grid;
  grid-template-columns: repeat(4, minmax(0, 1fr));
  gap: 14px;
  padding: 24px 28px 0;
}
.stat-card {
  background: var(--surface);
  border: 1px solid var(--line);
  border-radius: var(--rl);
  padding: 20px 22px;
}
.stat-val { font-size: 32px; font-weight: 300; letter-spacing: -1px; line-height: 1; margin-bottom: 6px; }
.stat-lbl { font-size: 11px; font-weight: 500; letter-spacing: 0.1em; text-transform: uppercase; color: var(--ink3); }

/* ─── LEAD TABLE ─────────────────────────────────── */
.table-wrap { padding: 20px 28px 28px; }
.table-header {
  display: flex;
  align-items: center;
  justify-content: space-between;
  margin-bottom: 14px;
}
.table-title { font-size: 14px; font-weight: 500; }
.table-actions { display: flex; gap: 8px; }

.tbl {
  width: 100%;
  border-collapse: collapse;
  background: var(--surface);
  border: 1px solid var(--line);
  border-radius: var(--rl);
  overflow: hidden;
  font-size: 14px;
}
.tbl thead th {
  padding: 11px 18px;
  text-align: left;
  font-size: 11px;
  font-weight: 500;
  letter-spacing: 0.08em;
  text-transform: uppercase;
  color: var(--ink3);
  background: var(--surface2);
  border-bottom: 1px solid var(--line);
}
.tbl tbody tr {
  border-bottom: 1px solid var(--line);
  cursor: pointer;
  transition: background 0.1s;
}
.tbl tbody tr:last-child { border-bottom: none; }
.tbl tbody tr:hover { background: var(--surface2); }
.tbl tbody td { padding: 14px 18px; vertical-align: middle; }
.tbl .td-name { font-weight: 500; font-size: 14px; }
.tbl .td-phone { font-size: 13px; color: var(--ink2); font-variant-numeric: tabular-nums; }
.tbl .td-msg { font-size: 13px; color: var(--ink3); max-width: 280px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.tbl .td-time { font-size: 12px; color: var(--ink4); white-space: nowrap; }
.tbl .td-att { font-size: 13px; color: var(--ink3); text-align: center; }

/* ─── BADGES ─────────────────────────────────── */
.badge {
  display: inline-flex; align-items: center;
  font-size: 11px; font-weight: 500;
  padding: 3px 9px; border-radius: 20px;
  letter-spacing: 0.02em; white-space: nowrap;
}
.b-new    { background: var(--blue-bg);   color: var(--blue-tx); }
.b-warm   { background: var(--amber-bg);  color: var(--amber-tx); }
.b-hot    { background: var(--red-bg);    color: var(--red-tx); }
.b-cold   { background: var(--grey-bg);   color: var(--grey-tx); }
.b-booked { background: var(--green-bg);  color: var(--green-tx); }
.b-imm    { background: var(--purple-bg); color: var(--purple-tx); }
.b-fam    { background: var(--rose-bg);   color: var(--rose-tx); }
.b-other  { background: var(--grey-bg);   color: var(--grey-tx); }

/* ─── DETAIL PANEL ─────────────────────────────────── */
.detail-panel {
  position: fixed;
  top: 0; right: 0; bottom: 0;
  width: 420px;
  background: var(--surface);
  border-left: 1px solid var(--line);
  z-index: 50;
  display: flex;
  flex-direction: column;
  transform: translateX(100%);
  transition: transform 0.24s cubic-bezier(0.4,0,0.2,1);
  overflow: hidden;
}
.detail-panel.open { transform: translateX(0); }
.dp-header {
  padding: 20px 24px;
  border-bottom: 1px solid var(--line);
  display: flex;
  align-items: center;
  justify-content: space-between;
  flex-shrink: 0;
}
.dp-title { font-size: 15px; font-weight: 500; }
.dp-close {
  width: 30px; height: 30px;
  border: none; background: var(--surface2);
  border-radius: 50%;
  cursor: pointer;
  font-size: 18px;
  color: var(--ink3);
  display: flex; align-items: center; justify-content: center;
  transition: background 0.12s;
}
.dp-close:hover { background: var(--line2); }

.dp-body { flex: 1; overflow-y: auto; padding: 20px 24px; }

.dp-name { font-family: var(--serif); font-size: 26px; letter-spacing: -0.4px; margin-bottom: 4px; }
.dp-phone { font-size: 16px; color: var(--ink3); margin-bottom: 14px; }
.dp-badges { display: flex; gap: 6px; flex-wrap: wrap; margin-bottom: 18px; }

.dp-msg-label { font-size: 11px; font-weight: 500; letter-spacing: 0.1em; text-transform: uppercase; color: var(--ink3); margin-bottom: 6px; }
.dp-msg {
  font-size: 14px; color: var(--ink2); line-height: 1.6;
  background: var(--surface2); border-radius: var(--r);
  padding: 12px 14px; margin-bottom: 20px;
  font-style: italic;
}
.dp-notes { font-size: 13px; color: var(--ink3); margin-bottom: 20px; font-style: italic; }

.call-btn {
  display: flex; align-items: center; justify-content: center; gap: 10px;
  width: 100%; padding: 15px;
  background: var(--green-bg); color: var(--green-tx);
  border: none; border-radius: var(--r);
  font-family: var(--sans); font-size: 15px; font-weight: 500;
  cursor: pointer; text-decoration: none;
  transition: opacity 0.12s;
  margin-bottom: 20px;
}
.call-btn:active { opacity: 0.8; }
.call-btn svg { width: 18px; height: 18px; }

.dp-divider { height: 1px; background: var(--line); margin-bottom: 20px; }
.dp-section-title { font-size: 11px; font-weight: 500; letter-spacing: 0.1em; text-transform: uppercase; color: var(--ink3); margin-bottom: 14px; }

/* ─── FORM ELEMENTS ─────────────────────────────────── */
.field { margin-bottom: 14px; }
.field label {
  display: block;
  font-size: 11px; font-weight: 500;
  letter-spacing: 0.1em; text-transform: uppercase;
  color: var(--ink3); margin-bottom: 6px;
}
.field input, .field select, .field textarea {
  width: 100%; padding: 11px 14px;
  border: 1px solid var(--line2);
  border-radius: var(--r);
  font-size: 14px; font-family: var(--sans);
  background: var(--paper); color: var(--ink);
  outline: none; transition: border-color 0.15s;
  appearance: none;
}
.field input:focus, .field select:focus, .field textarea:focus {
  border-color: var(--ink2);
}
textarea.field-ta { resize: none; line-height: 1.5; }

.seg { display: flex; gap: 6px; }
.seg-btn {
  flex: 1; padding: 9px 4px;
  border: 1px solid var(--line2); border-radius: var(--r);
  background: none; color: var(--ink3);
  font-family: var(--sans); font-size: 13px;
  cursor: pointer; transition: all 0.12s; text-align: center;
}
.seg-btn.on { background: var(--ink); color: var(--paper); border-color: var(--ink); }

.btn-primary {
  width: 100%; padding: 13px;
  background: var(--ink); color: var(--paper);
  border: none; border-radius: var(--r);
  font-family: var(--sans); font-size: 14px; font-weight: 500;
  cursor: pointer; margin-top: 4px;
  transition: opacity 0.12s;
}
.btn-primary:active { opacity: 0.8; }
.btn-ghost {
  width: 100%; padding: 12px;
  background: none; color: var(--ink3);
  border: 1px solid var(--line2); border-radius: var(--r);
  font-family: var(--sans); font-size: 14px;
  cursor: pointer; margin-top: 8px;
}

.btn-sm {
  padding: 7px 14px;
  border: 1px solid var(--line2); border-radius: var(--r);
  background: var(--surface); color: var(--ink2);
  font-family: var(--sans); font-size: 13px;
  cursor: pointer; transition: background 0.12s;
  white-space: nowrap;
}
.btn-sm:hover { background: var(--surface2); }
.btn-sm.primary { background: var(--ink); color: var(--paper); border-color: var(--ink); }

/* ─── ADD LEAD PANEL ─────────────────────────────────── */
.add-panel {
  position: fixed; top: 0; right: 0; bottom: 0;
  width: 420px;
  background: var(--surface);
  border-left: 1px solid var(--line);
  z-index: 50;
  display: flex; flex-direction: column;
  transform: translateX(100%);
  transition: transform 0.24s cubic-bezier(0.4,0,0.2,1);
}
.add-panel.open { transform: translateX(0); }

/* ─── EMPTY STATE ─────────────────────────────────── */
.empty { padding: 60px 28px; text-align: center; color: var(--ink3); font-size: 14px; }

/* ─── TOAST ─────────────────────────────────── */
.toast {
  position: fixed; bottom: 28px; left: 50%;
  transform: translateX(-50%) translateY(20px);
  background: var(--ink); color: var(--paper);
  padding: 12px 22px; border-radius: var(--r);
  font-size: 13px; font-weight: 500;
  white-space: nowrap; z-index: 999;
  opacity: 0; pointer-events: none;
  transition: all 0.2s;
}
.toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }

/* overlay */
.overlay {
  position: fixed; inset: 0; z-index: 40;
  background: rgba(0,0,0,0.25);
  backdrop-filter: blur(2px);
  opacity: 0; pointer-events: none;
  transition: opacity 0.24s;
}
.overlay.show { opacity: 1; pointer-events: all; }

/* ─── MOBILE ─────────────────────────────────── */
@media (max-width: 768px) {
  html, body { overflow: hidden; }

  .sidebar { display: none; }

  .main { height: 100dvh; padding-bottom: 64px; }

  .main-header {
    padding: 0 16px;
    height: 54px;
  }

  .stats-bar {
    grid-template-columns: repeat(2, minmax(0, 1fr));
    gap: 10px;
    padding: 16px 16px 0;
  }
  .stat-card { padding: 16px; }
  .stat-val { font-size: 28px; }

  .table-wrap { padding: 14px 16px 24px; }

  .tbl { display: none; }

  .mobile-cards { display: block; }

  .m-card {
    background: var(--surface);
    border: 1px solid var(--line);
    border-radius: var(--rl);
    padding: 14px 16px;
    margin-bottom: 10px;
    cursor: pointer;
    transition: background 0.1s;
    -webkit-tap-highlight-color: transparent;
  }
  .m-card:active { background: var(--surface2); }
  .m-card-top { display: flex; justify-content: space-between; align-items: flex-start; margin-bottom: 4px; }
  .m-card-name { font-size: 15px; font-weight: 500; }
  .m-card-time { font-size: 12px; color: var(--ink4); }
  .m-card-msg { font-size: 13px; color: var(--ink3); margin-bottom: 10px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .m-card-badges { display: flex; gap: 5px; flex-wrap: wrap; }

  /* bottom nav */
  .bottom-nav {
    position: fixed; bottom: 0; left: 0; right: 0;
    height: 64px;
    background: var(--surface);
    border-top: 1px solid var(--line);
    display: flex;
    z-index: 30;
  }
  .bn-item {
    flex: 1; display: flex; flex-direction: column;
    align-items: center; justify-content: center; gap: 3px;
    cursor: pointer; border: none; background: none;
    font-family: var(--sans); color: var(--ink3);
    transition: color 0.12s;
    -webkit-tap-highlight-color: transparent;
    padding-bottom: env(safe-area-inset-bottom, 0);
  }
  .bn-item.active { color: var(--ink); }
  .bn-icon { width: 22px; height: 22px; }
  .bn-label { font-size: 10px; font-weight: 500; letter-spacing: 0.06em; text-transform: uppercase; }

  .detail-panel, .add-panel { width: 100%; }
}

@media (min-width: 769px) {
  .mobile-cards { display: none; }
  .bottom-nav { display: none; }
}
</style>
</head>
<body>

<!-- APP -->
<div id="app">
  <div class="shell">

    <!-- SIDEBAR (desktop) -->
    <div class="sidebar">
      <div class="sb-top">
        <div class="sb-mark"><em>Imran</em> & Co</div>
        <div class="sb-tag">Lead Tracker</div>
      </div>
      <div class="sb-nav">
        <div class="sb-divider">Pipeline</div>
        <button class="sb-item active" id="sb-today" onclick="switchView('today')">
          <svg class="sb-icon" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5"><rect x="2" y="3" width="12" height="11" rx="2"/><path d="M5 1v4M11 1v4M2 7h12"/></svg>
          Today's leads
          <span class="sb-pill" id="pill-today">0</span>
        </button>
        <button class="sb-item" id="sb-followup" onclick="switchView('followup')">
          <svg class="sb-icon" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5"><circle cx="8" cy="8" r="6"/><path d="M8 5v3l2 2"/></svg>
          Follow-ups
          <span class="sb-pill" id="pill-follow">0</span>
        </button>
        <button class="sb-item" id="sb-booked" onclick="switchView('booked')">
          <svg class="sb-icon" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M2 8l4 4 8-8"/></svg>
          Booked
          <span class="sb-pill" id="pill-booked">0</span>
        </button>
        <button class="sb-item" id="sb-all" onclick="switchView('all')">
          <svg class="sb-icon" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M2 4h12M2 8h12M2 12h12"/></svg>
          All leads
          <span class="sb-pill" id="pill-all">0</span>
        </button>
        <div class="sb-divider" style="margin-top:16px;">Actions</div>
        <button class="sb-item" onclick="openAdd()">
          <svg class="sb-icon" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5"><circle cx="8" cy="8" r="6"/><path d="M8 5v6M5 8h6"/></svg>
          New lead
        </button>
      </div>
      <div class="sb-bottom"></div>
    </div>

    <!-- MAIN -->
    <div class="main">
      <div class="main-header">
        <div class="main-title" id="main-title">Today's leads</div>
        <div class="main-date" id="main-date"></div>
      </div>
      <div class="main-body" id="main-body"></div>
    </div>
  </div>

  <!-- bottom nav (mobile) -->
  <div class="bottom-nav">
    <button class="bn-item active" id="bn-today" onclick="switchView('today')">
      <svg class="bn-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><rect x="3" y="4" width="18" height="17" rx="2"/><path d="M8 2v4M16 2v4M3 10h18"/></svg>
      <span class="bn-label">Today</span>
    </button>
    <button class="bn-item" id="bn-followup" onclick="switchView('followup')">
      <svg class="bn-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><circle cx="12" cy="12" r="9"/><path d="M12 7v5l3 3"/></svg>
      <span class="bn-label">Follow-up</span>
    </button>
    <button class="bn-item" id="bn-booked" onclick="switchView('booked')">
      <svg class="bn-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M4 12l5 5L20 7"/></svg>
      <span class="bn-label">Booked</span>
    </button>
    <button class="bn-item" id="bn-add" onclick="openAdd()">
      <svg class="bn-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><circle cx="12" cy="12" r="9"/><path d="M12 8v8M8 12h8"/></svg>
      <span class="bn-label">Add</span>
    </button>
  </div>
</div>

<!-- DETAIL PANEL -->
<div class="overlay" id="overlay" onclick="closePanels()"></div>
<div class="detail-panel" id="detail-panel">
  <div class="dp-header">
    <div class="dp-title">Lead detail</div>
    <button class="dp-close" onclick="closePanels()">×</button>
  </div>
  <div class="dp-body" id="dp-body"></div>
</div>

<!-- ADD PANEL -->
<div class="add-panel" id="add-panel">

      transition: background 0.15s, border-color 0.15s;
    " onclick="pasteFromClipboard()" title="Paste WhatsApp conversation">

        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="var(--ink3)" stroke-width="2" stroke-linecap="round"><path d="M16 4h2a2 2 0 012 2v14a2 2 0 01-2 2H6a2 2 0 01-2-2V6a2 2 0 012-2h2"/><rect x="8" y="2" width="8" height="4" rx="1"/></svg>
        <span style="font-size:13px;font-weight:500;color:var(--ink2);">Paste from WhatsApp Grabber</span>

<div class="toast" id="toast"></div>

<script>
/* ══════════════════════════════════
   MICROSOFT AUTH (MSAL)
══════════════════════════════════ */
const msalConfig = {
  auth: {
    clientId: "fc4c91b8-bb04-4d4f-985c-f299c5d0a606",
    authority: "https://login.microsoftonline.com/6716a204-128b-44f3-979d-b78d7c38f042",
    redirectUri: window.location.origin
  },
  cache: { cacheLocation: "sessionStorage" }
};
const msalInstance = new msal.PublicClientApplication(msalConfig);

async function initAuth() {
  await msalInstance.handleRedirectPromise();
  const accounts = msalInstance.getAllAccounts();
  if (accounts.length === 0) {
    msalInstance.loginRedirect({ scopes: ["User.Read"] });
  }
}

// Skip auth when running locally via file:// or localhost
if (location.protocol !== "file:" && location.hostname !== "localhost" && location.hostname !== "127.0.0.1") {
  initAuth();
}

/* ══════════════════════════════════
   CONFIG
══════════════════════════════════ */
const POWER_AUTOMATE = "https://85d294f697eee25aaab51adf52c9ab.ab.environment.api.powerplatform.com:443/powerautomate/automations/direct/workflows/be62b19f41ca4abbab33c99a9ba4cc3e/triggers/manual/paths/invoke?api-version=1&sp=%2Ftriggers%2Fmanual%2Frun&sv=1.0&sig=7dwxAKZ20Up9CcgXgCb7F7VsWd5zdHBkXCIUhK9xXFs";
const API_KEY        = "imran-internal-2024";

/* ══════════════════════════════════
   DATA
══════════════════════════════════ */
let leads = [];

let view = "today";
let selectedId = null;
let callForm = { attempt:1, outcome:"", notes:"", followup:"" };

/* ══════════════════════════════════
   INIT
══════════════════════════════════ */
document.addEventListener("DOMContentLoaded", async () => {
  updateDate();
  document.getElementById("main-body").innerHTML = '<div class="empty">Loading leads…</div>';
  try {
    await fetchLeads();
  } catch(e) {
    console.error("Failed to load leads:", e);
    showToast("Could not load leads — check console");
  }
  render();
});

function updateDate() {
  document.getElementById("main-date").textContent =
    new Date().toLocaleDateString("en-GB", { weekday:"long", day:"numeric", month:"long" });
}

/* ══════════════════════════════════
   NAVIGATION
══════════════════════════════════ */
const viewTitles = { today:"Today's leads", followup:"Follow-ups", booked:"Booked consultations", all:"All leads" };

function switchView(v) {
  view = v;
  closePanels(false);

  // sidebar
  ["today","followup","booked","all"].forEach(k => {
    const el = document.getElementById("sb-"+k);
    if (el) el.classList.toggle("active", k === v);
  });
  // bottom nav
  ["today","followup","booked"].forEach(k => {
    const el = document.getElementById("bn-"+k);
    if (el) el.classList.toggle("active", k === v);
  });
  document.getElementById("bn-add")?.classList.remove("active");
  document.getElementById("main-title").textContent = viewTitles[v] || "";
  render();
}

/* ══════════════════════════════════
   RENDER
══════════════════════════════════ */
function filterLeads(v) {
  if (v === "today")    return leads.filter(l => l.status !== "booked" && l.status !== "cold");
  if (v === "followup") return leads.filter(l => l.attempt > 0 && l.status !== "booked" && l.status !== "cold");
  if (v === "booked")   return leads.filter(l => l.status === "booked");
  return leads;
}

function render() {
  const list = filterLeads(view);

  // update pills
  document.getElementById("pill-today").textContent  = filterLeads("today").length;
  document.getElementById("pill-follow").textContent = filterLeads("followup").length;
  document.getElementById("pill-booked").textContent = filterLeads("booked").length;
  document.getElementById("pill-all").textContent    = leads.length;

  const total   = leads.length;
  const called  = leads.filter(l => l.attempt > 0).length;
  const booked  = leads.filter(l => l.status === "booked").length;
  const conv    = total ? Math.round(booked / total * 100) : 0;

  const stats = `
  <div class="stats-bar">
    <div class="stat-card"><div class="stat-val">${total}</div><div class="stat-lbl">Total leads</div></div>
    <div class="stat-card"><div class="stat-val">${called}</div><div class="stat-lbl">Called</div></div>
    <div class="stat-card"><div class="stat-val">${booked}</div><div class="stat-lbl">Booked</div></div>
    <div class="stat-card"><div class="stat-val">${conv}%</div><div class="stat-lbl">Conversion</div></div>
  </div>`;

  const tableRows = list.map(l => `
  <tr onclick="openDetail('${l.id}')">
    <td><div class="td-name">${l.name}</div></td>
    <td class="td-phone">${l.phone}</td>
    <td class="td-msg">${l.message}</td>
    <td>${areaBadge(l.area)}</td>
    <td>${statusBadge(l.status)}</td>
    <td class="td-att">${l.attempt || "—"}</td>
    <td class="td-time">${l.time}</td>
  </tr>`).join("");

  const table = list.length ? `
  <table class="tbl">
    <thead><tr>
      <th>Name</th><th>Phone</th><th>Message</th>
      <th>Area</th><th>Status</th><th>Attempts</th><th>Time</th>
    </tr></thead>
    <tbody>${tableRows}</tbody>
  </table>` : "";

  const mobileCards = list.length ? list.map(l => `
  <div class="m-card" onclick="openDetail('${l.id}')">
    <div class="m-card-top">
      <span class="m-card-name">${l.name}</span>
      <span class="m-card-time">${l.time}</span>
    </div>
    <div class="m-card-msg">${l.message}</div>
    <div class="m-card-badges">
      ${statusBadge(l.status)} ${areaBadge(l.area)}
      ${l.attempt ? `<span class="badge b-cold">Attempt ${l.attempt}</span>` : ""}
    </div>
  </div>`).join("") : `<div class="empty">No leads in this view</div>`;

  const empty = !list.length ? `<div class="empty">No leads in this view</div>` : "";

  document.getElementById("main-body").innerHTML = `
    ${stats}
    <div class="table-wrap">
      <div class="table-header">
        <div class="table-title">${list.length} lead${list.length !== 1 ? "s" : ""}</div>
        <div class="table-actions">
          <button class="btn-sm primary" onclick="openAdd()">+ New lead</button>
        </div>
      </div>
      ${table}
      <div class="mobile-cards">${mobileCards}</div>
      ${empty}
    </div>`;
}

/* ══════════════════════════════════
   BADGES
══════════════════════════════════ */
function statusBadge(s) {
  const m = { new:"b-new New", hot:"b-hot Hot", warm:"b-warm Warm", cold:"b-cold Cold", booked:"b-booked Booked" };
  const [c, l] = (m[s] || "b-new New").split(" ");
  return `<span class="badge ${c}">${l}</span>`;
}
function areaBadge(a) {
  if (a === "Immigration") return `<span class="badge b-imm">Immigration</span>`;
  if (a === "Family Law")  return `<span class="badge b-fam">Family Law</span>`;
  return `<span class="badge b-other">${a}</span>`;
}

/* ══════════════════════════════════
   DETAIL PANEL
══════════════════════════════════ */
function openDetail(id) {
  selectedId = id;
  const l = leads.find(x => x.id === id);
  callForm = { attempt: l.attempt || 1, outcome:"", notes: l.notes || "", followup: l.followupdate || "" };
  renderDetail();
  document.getElementById("detail-panel").classList.add("open");
  document.getElementById("overlay").classList.add("show");
}

function renderDetail() {
  const l = leads.find(x => x.id === selectedId);
  const f = callForm;
  document.getElementById("dp-body").innerHTML = `
    <div class="dp-name">${l.name}</div>
    <div class="dp-phone">${l.phone}</div>
    <div class="dp-badges">${statusBadge(l.status)} ${areaBadge(l.area)}</div>
    <div class="dp-msg-label">Their message</div>
    <div class="dp-msg">"${l.message}"</div>
    ${l.notes ? `<div class="dp-notes">Previous note: ${l.notes}</div>` : ""}
    ${l.followupdate ? `<div class="dp-notes">Follow-up: ${new Date(l.followupdate + 'T00:00:00').toLocaleDateString("en-GB", {day:"numeric", month:"long", year:"numeric"})}</div>` : ""}
    <a href="tel:${l.phone.replace(/\s/g,"")}" class="call-btn">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round">
        <path d="M22 16.92v3a2 2 0 01-2.18 2 19.79 19.79 0 01-8.63-3.07A19.5 19.5 0 013.07 9.8 19.79 19.79 0 01.02 1.18 2 2 0 012 .02h3a2 2 0 012 1.72c.127.96.361 1.903.7 2.81a2 2 0 01-.45 2.11L6.09 7.91a16 16 0 006 6l1.27-1.27a2 2 0 012.11-.45c.907.339 1.85.573 2.81.7A2 2 0 0122 14.92v2z"/>
      </svg>
      Call ${l.phone}
    </a>
    <div class="dp-divider"></div>
    <div class="dp-section-title">Log outcome</div>
    <div class="field"><label>Call attempt</label>
      <div class="seg">
        ${[1,2,3].map(n=>`<button class="seg-btn ${f.attempt===n?"on":""}" onclick="callForm.attempt=${n};renderDetail()">
          ${n}${n===1?"st":n===2?"nd":"rd"} call
        </button>`).join("")}
      </div>
    </div>
    <div class="field"><label>Outcome</label>
      <select onchange="callForm.outcome=this.value">
        <option value="">Select outcome</option>
        <option value="answered"      ${f.outcome==="answered"?"selected":""}>Answered — proceeding</option>
        <option value="booked"        ${f.outcome==="booked"?"selected":""}>Consultation booked</option>
        <option value="noanswer"      ${f.outcome==="noanswer"?"selected":""}>No answer</option>
        <option value="callback"      ${f.outcome==="callback"?"selected":""}>Requested callback</option>
        <option value="notinterested" ${f.outcome==="notinterested"?"selected":""}>Not interested</option>
        <option value="wrongnumber"   ${f.outcome==="wrongnumber"?"selected":""}>Wrong number</option>
      </select>
    </div>
    <div class="field"><label>Notes</label>
      <textarea class="field-ta" rows="2" placeholder="Brief note about the call..." oninput="callForm.notes=this.value">${f.notes}</textarea>
    </div>
    <div class="field"><label>Follow-up date</label>
      <input type="date" value="${f.followup}" oninput="callForm.followup=this.value">
    </div>
    <button class="btn-primary" onclick="logCall('${l.id}')">Save outcome</button>
    <button class="btn-ghost" onclick="closePanels()">Cancel</button>`;
}

async function logCall(id) {
  const f = callForm;
  if (!f.outcome) { alert("Please select an outcome."); return; }
  const l = leads.find(x => x.id === id);
  const sm = { answered:"warm", booked:"booked", noanswer:"warm", callback:"warm", notinterested:"cold", wrongnumber:"cold" };
  l.status   = sm[f.outcome] || l.status;
  l.attempt  = f.attempt;
  l.notes    = f.notes;
  await postPA({
    cr053_whatsappleadsid: l.id,
    cr053_name:    l.name,
    cr053_phone:   l.phone,
    cr053_area:    l.area,
    cr053_message: l.message,
    cr053_stage:   l.status,
    cr053_attempt: f.attempt,
    cr053_notes:   f.notes,
    cr053_followupdate: f.followup || ""
  });
  closePanels();
  showToast("Outcome saved");
  render();
}

/* ══════════════════════════════════
   ADD LEAD
══════════════════════════════════ */
function openAdd() {
  document.getElementById("a-name").value  = "";
  document.getElementById("a-phone").value = "";
  document.getElementById("a-msg").value   = "";
  document.getElementById("a-area").value  = "Immigration";
  const ps = document.getElementById("paste-status");
  if (ps) { ps.style.display = "none"; ps.textContent = ""; }
  const zone = document.getElementById("paste-zone");
  if (zone) { zone.style.borderColor = ""; zone.style.background = ""; }
  document.getElementById("add-panel").classList.add("open");
  document.getElementById("overlay").classList.add("show");
}

/* ── Parse clipboard from WhatsApp Grabber extension ── */
function parseWhatsAppClip(text) {
  const result = { name: "", phone: "", message: "" };

  // Name line (may not exist for unsaved contacts)
  const nameMatch = text.match(/^Name:\s*(.+)$/m);
  if (nameMatch) result.name = nameMatch[1].trim();

  // Phone line
  const phoneMatch = text.match(/^Phone:\s*(.+)$/m);
  if (phoneMatch) result.phone = phoneMatch[1].trim();

  // If no name but phone exists, use phone as identifier
  if (!result.name && result.phone) result.name = result.phone;

  // Messages — format: [time, date] Sender: text
  // Split on both \r\n (Windows) and \n (Unix)
  const msgLines = [];
  const lines = text.split(/\r?\n/);
  lines.forEach(line => {
    const trimmed = line.trim();
    // Match [time, date] Sender: message text
    const m = trimmed.match(/^\[([^\]]+)\]\s+(.+?):\s(.+)$/);
    if (m) {
      const sender = m[2].trim();
      const msg    = m[3].trim();
      msgLines.push(sender + ": " + msg);
    }
  });

  if (msgLines.length > 0) result.message = msgLines.join("\n");

  return result;
}

async function pasteFromClipboard() {
  const zone   = document.getElementById("paste-zone");
  const status = document.getElementById("paste-status");
  try {
    const text = await navigator.clipboard.readText();
    if (!text || text.trim().length === 0) {
      status.style.display = "block";
      status.style.color   = "var(--red-tx)";
      status.textContent   = "Clipboard is empty — copy in the extension first.";
      return;
    }
    const parsed = parseWhatsAppClip(text);
    if (parsed.name)    document.getElementById("a-name").value  = parsed.name;
    if (parsed.phone)   document.getElementById("a-phone").value = parsed.phone;
    if (parsed.message) {
      const ta = document.getElementById("a-msg");
      ta.value = parsed.message;
      ta.scrollTop = 0;  // scroll to top so first message is visible
    }
    // Auto-detect legal area
    const msg = (parsed.message || "").toLowerCase();
    if (/visa|passport|immigration|asylum|leave|deport|refugee|citizenship|entry clearance/i.test(msg)) {
      document.getElementById("a-area").value = "Immigration";
    } else if (/divorce|custody|children|matrimonial|family|separation|spouse|adoption/i.test(msg)) {
      document.getElementById("a-area").value = "Family Law";
    }
    const filled = [parsed.name && "name", parsed.phone && "phone", parsed.message && "messages"].filter(Boolean).join(", ");
    status.style.display = "block";
    status.style.color   = filled ? "var(--green-tx)" : "var(--amber-tx)";
    status.textContent   = filled ? "Filled: " + filled : "Pasted — no structured data found. Check the extension.";
    zone.style.borderColor = "var(--green-tx)";
    zone.style.background  = "var(--green-bg)";
    setTimeout(() => { zone.style.borderColor = ""; zone.style.background = ""; }, 1200);
  } catch(err) {
    status.style.display = "block";
    status.style.color   = "var(--red-tx)";
    status.textContent   = "Could not read clipboard. Allow clipboard access when prompted.";
  }
}

async function submitAdd() {
  const phone = document.getElementById("a-phone").value.trim();
  if (!phone) { alert("Phone number is required."); return; }
  const lead = {
    id: Date.now(),
    name:    document.getElementById("a-name").value.trim() || "Unknown",
    phone,
    message: document.getElementById("a-msg").value.trim() || "Added manually",
    area:    document.getElementById("a-area").value,
    status:  "new", attempt:0,
    time:    new Date().toLocaleTimeString("en-GB",{hour:"2-digit",minute:"2-digit"}),
    notes:   ""
  };
  leads.unshift(lead);
  await postPA({ cr053_name:lead.name, cr053_phone:lead.phone, cr053_area:lead.area, cr053_message:lead.message, cr053_stage:lead.status, cr053_time:lead.time||"" });
  closePanels();
  showToast("Lead added");
  render();
}

/* ══════════════════════════════════
   PANELS
══════════════════════════════════ */
function closePanels(doRender = true) {
  document.getElementById("detail-panel").classList.remove("open");
  document.getElementById("add-panel").classList.remove("open");
  document.getElementById("overlay").classList.remove("show");
  if (doRender) render();
}

/* ══════════════════════════════════
   FETCH LEADS FROM API
══════════════════════════════════ */
async function fetchLeads() {
  const res = await fetch("/api/leads");
  if (!res.ok) throw new Error(`API ${res.status}: ${await res.text()}`);
  const rows = await res.json();
  leads = rows.map(r => ({
    id:          r.cr053_whatsappleadsid,
    name:        r.cr053_name    || "Unknown",
    phone:       r.cr053_phone   || "",
    message:     r.cr053_message || "",
    area:        r.cr053_area    || "Unknown",
    status:      r.cr053_status  || "new",
    attempt:     r.cr053_attempt || 0,
    time:        r.createdon
                   ? new Date(r.createdon).toLocaleTimeString("en-GB", { hour:"2-digit", minute:"2-digit" })
                   : r.cr053_time || "",
    notes:       r.cr053_notes       || "",
    followupdate: r.cr053_followupdate || ""
  }));
}

/* ══════════════════════════════════
   POWER AUTOMATE
══════════════════════════════════ */
async function postPA(payload) {
  if (POWER_AUTOMATE === "YOUR_POWER_AUTOMATE_URL_HERE") return;
  try {
    await fetch(POWER_AUTOMATE, {
      method:"POST",
      headers:{"Content-Type":"application/json","x-api-key":API_KEY},
      body: JSON.stringify(payload)
    });
  } catch(e) { console.warn("PA error:", e); }
}

/* ══════════════════════════════════
   TOAST
══════════════════════════════════ */
function showToast(msg) {
  const t = document.getElementById("toast");
  t.textContent = msg;
  t.classList.add("show");
  setTimeout(() => t.classList.remove("show"), 2200);
}
</script>
